<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بستنی‌ها</title>
    <link rel="stylesheet" href="../css/tailwind-persian.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <a href="menu.html" class="back-button">← بازگشت</a>
        <h1>بستنی‌ها</h1>
    </header>

    <div class="menu" id="menuContainer"></div>

    <footer>
        <p>تمام حقوق محفوظ است &copy; 2025 مجموعه گردشگری حرا</p>
    </footer>

    <script>
        // Data-driven menu structure for Ice Cream
        const menuItems = [
            {
                id: 1,
                name: "شکلاتی",
                description: "بستنی شکلات خالص و خوشمزه",
                price: "200",
                image: "../images/ch.jpg"
            },
            {
                id: 2,
                name: "وانیلی",
                description: "بستنی وانیل کلاسیک و دلپذیر",
                price: "200",
                image: "../images/vn.jpg"
            },
            {
                id: 3,
                name: "زعفرانی",
                description: "بستنی زعفران فاخر و معطر",
                price: "230",
                image: "../images/sf.jpg"
            },
            {
                id: 4,
                name: "کاراملی",
                description: "بستنی کارامل شیرین و لذیذ",
                price: "220",
                image: "../images/cri.jpg"
            },
            {
                id: 5,
                name: "توت فرنگی",
                description: "مخلوط توت فرنگی رنگارنگ",
                price: "210",
                image: "../images/stb.jpg"
            },
            {
                id: 6,
                name: "شاه توت",
                description: "بستنی توت‌ طبیعی و تازه",
                price: "220",
                image: "../images/sht.jpg"
            }
        ];

        // Render menu items
        const menuContainer = document.getElementById('menuContainer');
        
        // Format price with thousand separator
        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }
        
        menuItems.forEach((item) => {
            const menuItem = document.createElement('div');
            menuItem.className = 'menu-item';
            menuItem.setAttribute('data-id', item.id);
            
            menuItem.innerHTML = `
                <img src="${item.image}" alt="${item.name}" loading="lazy">
                <div class="menu-item-content">
                    <h3>${item.name}</h3>
                    <p>${item.description}</p>
                    <p class="price"><strong>${formatPrice(item.price)}</strong> هزار تومان</p>
                </div>
            `;
            
            menuContainer.appendChild(menuItem);
        });
    </script>
</body>

</html>
