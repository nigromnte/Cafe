</head>

<body>
    <header>
        <a href="menu.html" class="back-button">← بازگشت</a>

    <footer>

    </footer>

    <script>

            },
            {
                id: 3,

                description: "آب، چای ترش، نباط، قند یا شکر",
                price: "100",
                image: "../images/cht.jpg"
            },
            {
                id: 4,
                name: "چای سبز",
                description: "آب، چای سبز، نباط، قند یا شکر",
                price: "80",
                image: "../images/chs.jpg"
            },
            {
                id: 5,
                name: "چای کرک",
                description: "آب، چای کرک، نباط، قند یا شکر",
                price: "100",
                image: "../images/chkk.jpg"
            },
            {
                id: 6,
                name: "چای ماسالا",
                description: "آب، چای ماسالا، نباط، قند یا شکر",
                price: "100",
                image: "../images/chm.jpg"
            },
            {
                id: 7,
                name: "دمنوش به لیمو",
                description: "آب، چای لیمو، نباط، قند یا شکر",
                price: "100",
                image: "../images/db.jpg"
            },
            {
                id: 8,

                price: "100",

            },
            {
                id: 11,
                name: "لته",
                description: "آب، قهوه، شیر، شکر",
                price: "130",
                image: "../images/lt.jpg"
            },
            {
                id: 12,
                name: "هات چاکلت",
                description: "آب، شیر، شکلات، قند یا شکر",
                price: "150",
                image: "../images/ht.jpg"
            },
            {
                id: 13,
                name: "موکا",
                description: "آب، قهوه، شیر، شکلات",
                price: "150",
                image: "../images/mk.jpg"
            },
            {
                id: 14,
                name: "کاپوچینو",
                description: "آب، قهوه، شیر، کف شیر",
                price: "130",
                image: "../images/kc.jpg"
            }
        ];

        // Render menu items
        const menuContainer = document.getElementById('menuContainer');
        
        // Format price with thousand separator
        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }
        
        menuItems.forEach((item) => {
            const menuItem = document.createElement('div');
            menuItem.className = 'menu-item';
            menuItem.setAttribute('data-id', item.id);
            
            menuItem.innerHTML = `
                <img src="${item.image}" alt="${item.name}" loading="lazy">
                <div class="menu-item-content">
                    <h3>${item.name}</h3>
                    <p>${item.description}</p>
                    <p class="price"><strong>${formatPrice(item.price)}</strong> هزار تومان</p>
                </div>
            `;
            
            menuContainer.appendChild(menuItem);
        });
    </script>
</body>

</html>
